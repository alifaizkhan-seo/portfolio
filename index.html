<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Faiz Khan // Programmatic SEO & Data Automation Platform</title>
    <!-- Tailwind CSS CDN Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons Matrix & Chart Engine -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #03060f; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(8, 12, 24, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .sidebar-item-active { background: rgba(16, 185, 129, 0.08); border-left: 3px solid #10b981; color: #fff; }
    </style>
</head>
<body class="text-gray-400 antialiased selection:bg-emerald-500 selection:text-black min-h-screen flex flex-col">

    <!-- PLATFORM HEADER MODULE -->
    <header class="w-full border-b border-gray-900/60 bg-[#050914] px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white font-bold text-sm tracking-tighter">AFK</div>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <span class="text-xs uppercase tracking-widest text-gray-500 font-bold mono">Core_Control_v2.6</span>
        </div>
        <div class="flex items-center gap-4 text-xs">
            <span class="flex items-center gap-1.5 text-emerald-400 font-medium"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SYSTEM_SECURE</span>
        </div>
    </header>

    <!-- MAIN INTERFACE MATRIX -->
    <div class="w-full max-w-7xl mx-auto flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 md:p-6 items-start">
        
        <!-- SIDE NAVIGATION ENGINE (3 Columns) -->
        <aside class="lg:col-span-3 w-full flex flex-col gap-4 lg:sticky lg:top-24">
            <div class="glass-panel rounded-2xl p-4 flex flex-col gap-1">
                <span class="text-[10px] uppercase font-bold text-gray-600 px-3 mb-2 tracking-wider">Console Directory</span>
                <button onclick="navigateDashboard('overview')" id="nav-overview" class="w-full text-left text-xs py-3 px-3 rounded-xl transition flex items-center gap-2.5 sidebar-item-active"><i class="fa-solid fa-grid-2 text-emerald-400"></i> Command Dashboard</button>
                <button onclick="navigateDashboard('automation')" id="nav-automation" class="w-full text-left text-xs py-3 px-3 rounded-xl transition flex items-center gap-2.5 text-gray-400 hover:bg-gray-900/40"><i class="fa-solid fa-square-terminal"></i> Programmatic SEO Labs</button>
                <button onclick="navigateDashboard('local-seo')" id="nav-local-seo" class="w-full text-left text-xs py-3 px-3 rounded-xl transition flex items-center gap-2.5 text-gray-400 hover:bg-gray-900/40"><i class="fa-solid fa-map-location-dot"></i> GMB Citation Registry</button>
                <button onclick="navigateDashboard('platforms')" id="nav-platforms" class="w-full text-left text-xs py-3 px-3 rounded-xl transition flex items-center gap-2.5 text-gray-400 hover:bg-gray-900/40"><i class="fa-solid fa-network-wired"></i> Managed Networks</button>
            </div>

            <!-- Profile Overview Quick Card -->
            <div id="sidebar-meta-target" class="glass-panel rounded-2xl p-5 text-xs space-y-3">
                <!-- Data will inject securely here -->
            </div>
        </aside>

        <!-- CORE CONTENT RENDERING HUB (9 Columns) -->
        <main class="lg:col-span-9 w-full flex flex-col gap-6" id="dashboard-viewport">
            <!-- Dynamic Content Viewports Inject Securely Via JavaScript Engine -->
        </main>
    </div>

    <!-- CORE SCRIPTS LOADING INTERFACES -->
    <script src="app.js"></script>
</body>
</html>
